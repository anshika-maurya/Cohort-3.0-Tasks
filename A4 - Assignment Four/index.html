<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main>
      <nav>
        <img src="./Images/logo.png" alt="logo-image" />
        <div class="links">
          <a href="#">New Arrivals</a>
          <a href="#">Shop</a>
          <a href="#">Beauty</a>
          <a href="#">Sale</a>
          <a href="#">Journal</a>
        </div>
        <div class="side-links">
          <i class="ri-search-line"></i>
          <i class="ri-account-circle-2-line"></i>
          <button><i class="ri-shopping-cart-line"></i></button>
        </div>
      </nav>

      <header>
        <img
          width="45"
          height="45"
          src="https://img.icons8.com/emoji/48/sunflower-emoji.png"
          alt="sunflower-emoji"
        />
        <h1>Make Your Fashion Look More Charming</h1>
        <img
          width="45"
          height="45"
          src="https://img.icons8.com/emoji/48/hibiscus.png"
          alt="hibiscus"
        />
      </header>

      <section class="container">
        
            <div class="text card">
          <p>Summer Collection</p>
          <h2>Trandy and Clussi For New Seasson</h2>
        </div>

        <div class="top-right-flower-icon">
          <img
            width="45"
            height="45"
            src="https://img.icons8.com/external-smashingstocks-flat-smashing-stocks/66/FAB005/external-Flower-thanksgiving-smashingstocks-flat-smashing-stocks.png"
            alt="external-Flower-thanksgiving-smashingstocks-flat-smashing-stocks"
          />
        </div>

        <div class="center-star-icon">
          <img
            width="50"
            height="50"
            src="https://img.icons8.com/glyph-neue/64/1A1A1A/bahai-star.png"
            alt="bahai-star"
          />
        </div>

        <div class="explore-circle card">
          <img src="./Images/decorate-things.png" alt="explore-circle" />
        </div>
        

        <div class="left-model card">
          <img src="./Images/4.jpg" alt="left-model" />
        </div>
        <div class="left-side-top-model card">
          <img src="./Images/2.jpg" alt="left-side-top-model" />
        </div>
        <div class="left-side-bottom-model card">
          <img src="./Images/3.jpg" alt="left-side-bottom-model" />
        </div>

        <div class="center-top-fashion-model card">
          <img src="./Images/01.png" alt="center-model" />
        </div>

        <div class="right-side-top-model card">
          <img src="./Images/5.jpg" alt="right-side-top-model" />
        </div>

        <div class="right-side-bottom-model card">
          <img src="./Images/six.png" alt="right-side-bottom-model" />
        </div>
        <div class="right-model card">
          <img src="./Images/7.1.png" alt="right-model" />
          
        </div>

        <div class="inverted-comma-icon">
          <img
            width="40"
            height="40"
            src="https://img.icons8.com/glyph-neue/64/1A1A1A/quote-left.png"
            alt="quote-left"
          />
        </div>

        <div class="year-box ">
          <h4>#2026</h4>
          <img
            
            src="https://img.icons8.com/emoji/48/FAB005/wilted-flower.png"
            alt="wilted-flower"
          />
        </div>

        <div class="bottom-section">
          <div class="quote-left-bottom">
            <p>
              I'm very much of the 'buy less but buy better' philosophy. It's
              what I've never really knew
            </p>
            <div class="signature">
              <img src="./Images/signyellow.png" alt="signature" />
              
              
              </div>
            </div>

            <div class="scroll-bar-center">
                <img
                src="https://img.icons8.com/emoji/48/F25081/cherry-blossom.png"
                alt="cherry-blossom"
              />
            <div class="bottom-center">
            <p>scroll down</p>
            <i class="ri-arrow-down-wide-line"></i>
          </div>
          <img src="./Images/mark.png" alt="mark">
          
                
            </div>

            <div class="article-box">
            <div class="date">31 May 2026  .   Blog</div>
            <div class="blog">
              <span>01</span>
              <p>Always be strong and have values</p>
              <i class="ri-arrow-right-long-line"></i>
            </div>
          </div>
          </div>

          

          
        </div>
      </section>
    </main>
  </body>
</html>
